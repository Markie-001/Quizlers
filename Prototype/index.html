<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prototypen</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
    <img id="question-image" src="" alt="Question image" />

    <div class="quiz-box">
        <h2 id="question">Question Text</h2>

        <div class="options">
            <button class="option" onclick="selectAnswer(0)">Option 1</button>
            <button class="option" onclick="selectAnswer(1)">Option 2</button>
            <button class="option" onclick="selectAnswer(2)">Option 3</button>
            <button class="option" onclick="selectAnswer(3)">Option 4</button>
        </div>

        <div class="open-container">
            <input type="text" id="open-input"/>
            <button id="submit-open" onclick="submitOpenAnswer()">Submit</button>
        </div>

        <div class="timer">
            <span id="countdown">Time left: 10s</span>
            <button id="next-btn" onclick="nextQuestion()">Next</button>
        </div>

        <p id="feedback"></p>
        <h3 id="score">Score: 0</h3>
        <button id="restart-btn" onclick="restartQuiz()" style="display: none;">Restart Quiz</button>
    </div>
</div>
</body>
<script src="script.js"></script>
</html>
