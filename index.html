<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prototypen</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2 id="question">Question Text</h2>
        <div class="options">
            <button class="option" id="option1" onclick="selectAnswer(0)">Option 1</button>
            <button class="option" id="option2" onclick="selectAnswer(1)">Option 2</button>
            <button class="option" id="option3" onclick="selectAnswer(2)">Option 3</button>
            <button class="option" id="option4" onclick="selectAnswer(3)">Option 4</button>
    </div>
    <button id="next-btn" onclick="nextQuestion()">Next</button>
    <h3 id="score">Score: 0</h3>
    <button id="restart-btn" onclick="restartQuiz()" style="display: none;">Restart Quiz</button>
</body>
<script src="script.js"></script>
</html>
